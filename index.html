<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#101828">
<title>VoiceVocab - 音声英単語トレーニング</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 設定画面 ===== -->
<div id="setup" class="screen setup-grid">
  <h1 class="span2">🎧 VoiceVocab</h1>
  <p class="sub span2">声で答える英単語・熟語トレーニング <span id="appVersion" class="version"></span></p>

  <button id="startBtn" class="big-btn span2">▶ スタート</button>

  <div class="card">
    <h2>レベル（複数選択可）</h2>
    <div class="chips" id="levelChips">
      <label class="chip"><input type="checkbox" value="1"><span>Lv1</span></label>
      <label class="chip"><input type="checkbox" value="2"><span>Lv2</span></label>
      <label class="chip"><input type="checkbox" value="3" checked><span>Lv3</span></label>
      <label class="chip"><input type="checkbox" value="4"><span>Lv4</span></label>
      <label class="chip"><input type="checkbox" value="5"><span>Lv5</span></label>
    </div>
    <p class="hint">Lv1 中学基礎 ／ Lv2 中学発展 ／ Lv3 高校 ／ Lv4 大学受験 ／ Lv5 上級</p>
  </div>

  <div class="card">
    <h2>種類</h2>
    <div class="chips" id="kindChips">
      <label class="chip"><input type="checkbox" value="w" checked><span>単語</span></label>
      <label class="chip"><input type="checkbox" value="i" checked><span>熟語</span></label>
    </div>
  </div>

  <div class="card">
    <h2>出題形式</h2>
    <div class="chips radio" id="modeChips">
      <label class="chip"><input type="radio" name="mode" value="e2j" checked><span>英→和</span></label>
      <label class="chip"><input type="radio" name="mode" value="j2e"><span>和→英</span></label>
      <label class="chip"><input type="radio" name="mode" value="mix"><span>ミックス</span></label>
    </div>
  </div>

  <div class="card">
    <h2>問題数</h2>
    <div class="chips radio" id="countChips">
      <label class="chip"><input type="radio" name="count" value="10"><span>10問</span></label>
      <label class="chip"><input type="radio" name="count" value="20" checked><span>20問</span></label>
      <label class="chip"><input type="radio" name="count" value="50"><span>50問</span></label>
      <label class="chip"><input type="radio" name="count" value="999"><span>エンドレス</span></label>
    </div>
  </div>

  <div class="card">
    <h2>オプション</h2>
    <label class="opt"><input type="checkbox" id="optSpeak" checked> 問題を読み上げる（ハンズフリー用）</label>
    <label class="opt"><input type="checkbox" id="optAuto" checked> 自動で次の問題へ進む</label>
    <label class="opt"><input type="checkbox" id="optSyn"> 類義語を表示する</label>
  </div>

  <div class="card stats" id="statsCard">
    <h2>学習状況</h2>
    <div id="statsBody">-</div>
  </div>

  <button id="wrongListBtn" class="sub-btn span2">❌ 間違えた問題リスト</button>
  <p class="note span2" id="supportNote"></p>
</div>

<!-- ===== 学習画面 ===== -->
<div id="session" class="screen hidden">
  <div class="topbar">
    <span id="progressLabel">1 / 20</span>
    <span id="scoreLabel">⭕0 ❌0</span>
    <button id="quitBtn" class="mini-btn">終了</button>
  </div>

  <div class="q-area">
    <div id="qKind" class="q-kind">英→和・Lv1</div>
    <div id="qText" class="q-text">apple</div>
    <div id="qIpa" class="q-ipa"></div>
    <div id="phase" class="phase">…</div>
    <div id="micIcon" class="mic idle">🎤</div>
    <div id="heard" class="heard"></div>
    <div id="verdict" class="verdict"></div>
    <div id="qEtym" class="q-etym"></div>
    <div id="qExample" class="q-example"></div>
    <div id="qSynonyms" class="q-syn"></div>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button id="repeatBtn" class="ctl-btn">🔁 もう一度</button>
      <button id="skipBtn" class="ctl-btn">⏭ スキップ</button>
    </div>
    <div class="btn-row">
      <button id="pauseBtn" type="button" class="ctl-btn pause">🖐 押し続けて一時停止</button>
    </div>
    <div class="btn-row" id="nextRow" style="visibility:hidden">
      <button id="nextBtn" class="ctl-btn next">次の問題 ▶</button>
    </div>
    <p class="note">音声コマンド: 「スキップ」「もう一度」「終了」／指を離すと次の問題へ進みます</p>
  </div>
  <div id="historyBar" class="history-bar"></div>
</div>

<!-- ===== 間違えた問題リスト画面 ===== -->
<div id="wrongScreen" class="screen hidden">
  <h1>❌ 間違えた問題</h1>
  <p class="sub">間違えた回数が多い順</p>
  <div class="card"><div id="wrongListBody">-</div></div>
  <button id="wrongBackBtn" class="big-btn">設定に戻る</button>
</div>

<!-- ===== 結果画面 ===== -->
<div id="result" class="screen hidden">
  <h1>結果</h1>
  <div class="card" id="resultSummary"></div>
  <div class="card"><h2>間違えた問題</h2><div id="resultWrong"></div></div>
  <button id="backBtn" class="big-btn">設定に戻る</button>
</div>

<script src="lib/kuromoji/kuromoji.js"></script>
<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
